# BioLite-Interpret Qwen 1.5B cross-architecture config
# Mirrors config.yaml (Llama 1B) with the base model swapped — same QLoRA
# rank, alpha, target modules, optimizer, schedule, and 3-epoch length.

model:
  base_model: "Qwen/Qwen2.5-1.5B-Instruct"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"

training:
  output_dir: "./checkpoints/biolite-interpret-qwen-1.5b"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  eval_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  bf16: true
  max_grad_norm: 1.0
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 25
  save_total_limit: 4
  load_best_model_at_end: false
  metric_for_best_model: "eval_loss"
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  max_seq_length: 1024
  report_to: "none"

data:
  train_file: "../data/splits/train.json"
  eval_file: "../data/splits/val.json"
  test_file: "../data/splits/test.json"

wandb:
  project: "biolite-suite"
  run_name: "interpret-sft-qwen-1.5b"

huggingface:
  push_to_hub: false
  hub_model_id: "tathadn/biolite-interpret-qwen-1.5b"
